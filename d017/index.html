<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cassino Recreativo - Doubles Animado</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --primary-color: #4CAF50;
            --accent-color: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding: 10px; /* Padding menor para aproveitar tela no mobile */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centraliza na tela toda */
        }

        .container {
            width: 100%;
            max-width: 500px; /* Mais estreito para focar no formato mobile */
            background-color: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 5px 0;
            font-size: 24px;
        }

        p.subtitle {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 15px;
        }

        .balance-board {
            font-size: 20px;
            background-color: #111;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--accent-color);
        }

        .bet-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            text-align: center;
            background-color: #333;
            color: white;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .options {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        /* --- O SEGREDO DO AJUSTE DA IMAGEM ESTÁ AQUI --- */
        .option-btn {
            flex: 1;
            display: flex;
            align-items: flex-end; /* Empurra o texto para baixo */
            justify-content: center;
            min-height: 90px; /* Altura fixa para dar espaço à imagem */
            padding: 8px 4px;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
            background-color: #2a2a2a; /* Fundo para caso a imagem não preencha tudo */
            
            /* Ajuste da Imagem */
            background-size: contain; /* Faz a imagem caber inteira sem cortar */
            background-position: center top 5px; /* Centraliza no topo com uma margenzinha */
            background-repeat: no-repeat; /* Evita que a imagem se multiplique */
        }

        .option-btn.selected {
            border-color: var(--accent-color);
            transform: scale(1.03);
            background-color: #3a3a3a;
        }

        .play-btn {
            background-color: var(--primary-color);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #2e7d32; /* Efeito de botão 3D */
        }

        .play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #2e7d32;
        }

        .play-btn:disabled {
            background-color: #555;
            box-shadow: 0 4px 0 #333;
            cursor: not-allowed;
            transform: none;
        }

        /* Estilos da Roleta */
        .roulette-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 80px; /* Menor para mobile */
            overflow: hidden;
            border-radius: 8px;
            background-color: #111;
            border: 2px solid #444;
        }

        .roulette-strip {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 3s cubic-bezier(0.1, 0.7, 0.3, 1);
        }

        .roulette-item {
            width: 80px;
            height: 100%;
            background-size: cover; /* Ajusta imagem na roleta também */
            background-repeat: no-repeat;
            background-position: center;
            border-right: 1px solid #222;
        }

        .roulette-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background-color: var(--accent-color);
            z-index: 10;
            box-shadow: 0 0 8px var(--accent-color);
        }

        #resultMessage {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
        }

        .win { color: #4CAF50; }
        .lose { color: #f42f42; }

        /* Ajustes extras para telas muito pequenas (iPhone SE, etc) */
        @media (max-width: 360px) {
            .option-btn {
                font-size: 11px;
                min-height: 75px;
            }
            .balance-board { font-size: 18px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LPÊ LOUCO ROLETA</h1>
        <p class="subtitle">Dinheiro Real</p>

        <div class="balance-board">
            Saldo: <strong id="balanceDisplay">50</strong>
        </div>

        <div class="bet-section">
            <input type="number" id="betAmount" placeholder="Valor da aposta..." min="1" inputmode="numeric">
            
            <div class="options" id="betOptionsContainer">
                </div>
            
            <button class="play-btn" id="playBtn" onclick="playGame()">Girar Roleta</button>
        </div>

        <div class="roulette-container">
            <div class="roulette-marker"></div>
            <div class="roulette-strip" id="rouletteStrip"></div>
        </div>

        <div id="resultMessage">Escolha sua aposta e gire!</div>
    </div>

    <script>
        // CONFIGURAÇÃO DO JOGO (Altere os links das imagens aqui!)
        const gameConfig = {
            red: { 
                id: 'red', name: 'LPÊ',
                url: 'lpe.jpeg', // Exemplo de imagem (cereja)
                payout: 2, weight: 7 
            },
            white: {
                id: 'white', name: 'ET',
                url: 'et.jpeg', // Exemplo de imagem (diamante)
                payout: 10, weight: 1 
            },
            black: {
                id: 'black', name: 'DJ',
                url: 'dj.jpeg', // Exemplo de imagem (espadilha)
                payout: 2, weight: 7
            }
        };

        let balance = 1000;
        let selectedOptionId = null;
        const totalItemsInStrip = 60; 
        const itemWidth = 80; 

        const balanceDisplay = document.getElementById('balanceDisplay');
        const betAmountInput = document.getElementById('betAmount');
        const betOptionsContainer = document.getElementById('betOptionsContainer');
        const rouletteStrip = document.getElementById('rouletteStrip');
        const resultMessage = document.getElementById('resultMessage');
        const playBtn = document.getElementById('playBtn');

        function init() {
            // Criar botões
            for (const key in gameConfig) {
                const option = gameConfig[key];
                const button = document.createElement('button');
                button.className = `option-btn btn-${option.id}`;
                button.style.backgroundImage = `url('${option.url}')`;
                button.innerHTML = `${option.name}<br>(${option.payout}x)`;
                button.onclick = () => selectOption(option.id);
                betOptionsContainer.appendChild(button);
            }
            createRouletteStrip();
            updateBalance();
        }

        function selectOption(optionId) {
            selectedOptionId = optionId;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`.btn-${optionId}`).classList.add('selected');
        }

        function createRouletteStrip() {
            const optionsArray = [];
            for (const key in gameConfig) {
                for (let i = 0; i < gameConfig[key].weight; i++) {
                    optionsArray.push(gameConfig[key]);
                }
            }

            for (let i = 0; i < totalItemsInStrip; i++) {
                const randomOption = optionsArray[Math.floor(Math.random() * optionsArray.length)];
                const item = document.createElement('div');
                item.className = 'roulette-item';
                item.style.backgroundImage = `url('${randomOption.url}')`;
                item.dataset.optionId = randomOption.id;
                rouletteStrip.appendChild(item);
            }
        }

        function playGame() {
            const betAmount = parseInt(betAmountInput.value);

            if (!selectedOptionId) return alert("Selecione uma imagem para apostar!");
            if (isNaN(betAmount) || betAmount <= 0) return alert("Insira um valor válido!");
            if (betAmount > balance) return alert("Saldo insuficiente!");

            balance -= betAmount;
            updateBalance();

            playBtn.disabled = true;
            resultMessage.innerHTML = "Girando...";
            resultMessage.className = "";

            const optionsArray = [];
            for (const key in gameConfig) {
                for (let i = 0; i < gameConfig[key].weight; i++) {
                    optionsArray.push(gameConfig[key]);
                }
            }
            const winningOption = optionsArray[Math.floor(Math.random() * optionsArray.length)];

            rouletteStrip.style.transition = 'none';
            rouletteStrip.style.transform = 'translateX(0)';
            void rouletteStrip.offsetWidth; 

            rouletteStrip.style.transition = 'transform 3s cubic-bezier(0.1, 0.7, 0.3, 1)';

            const possibleWinningIndexes = [];
            const items = rouletteStrip.querySelectorAll('.roulette-item');
            items.forEach((item, index) => {
                if (item.dataset.optionId === winningOption.id && index > totalItemsInStrip * 0.8) {
                    possibleWinningIndexes.push(index);
                }
            });

            const finalIndex = possibleWinningIndexes.length > 0 
                ? possibleWinningIndexes[Math.floor(Math.random() * possibleWinningIndexes.length)]
                : totalItemsInStrip - 1;

            const containerWidth = document.querySelector('.roulette-container').offsetWidth;
            const finalOffset = (finalIndex * itemWidth) - (containerWidth / 2) + (itemWidth / 2);

            rouletteStrip.style.transform = `translateX(-${finalOffset}px)`;

            setTimeout(() => {
                let winnings = 0;
                if (selectedOptionId === winningOption.id) {
                    winnings = betAmount * winningOption.payout;
                    resultMessage.innerHTML = `🎉 ${winningOption.name}! Ganhou ${winnings}!`;
                    resultMessage.className = "win";
                    balance += winnings;
                } else {
                    resultMessage.innerHTML = `😢 Deu ${winningOption.name}. Perdeu.`;
                    resultMessage.className = "lose";
                }

                updateBalance();
                playBtn.disabled = false;

                if (balance <= 0) {
                    setTimeout(() => {
                        alert("Saldo zerado! Recarregando 1000 moedas pra você continuar brincando!");
                        balance = 1000;
                        updateBalance();
                    }, 1000);
                }
            }, 3000);
        }

        function updateBalance() {
            balanceDisplay.innerText = balance;
        }

        init();
    </script>
</body>
</html>
